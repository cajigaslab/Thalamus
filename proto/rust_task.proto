syntax = "proto3";

// Control channel between the Python delegate task (joystick_intro_rust.py) and
// the Rust executor process. The delegate is the CLIENT; the Rust process HOSTS
// this service (default localhost:50060).
//
// CANONICAL LOCATION: this file lives here in proto/ alongside every other
// Thalamus proto. Python stubs are generated by thalamus/build.py (which reads
// -Iproto and requires "rust_task" in its `services` list). The Rust crate
// compiles this same file via rust/joystick_task/build.rs. Keep this the single
// source of truth — do not fork a copy under rust/.
//
// Why a bespoke service instead of the built-in TaskController.execution stream:
// that stream is only consumed when the Python task_controller has no local
// widget (task_context.py:696 vs :717), which never happens on the operator rig,
// and its single executor slot would hijack every task type. See
// docs/rust_bci_patch.md "Control handoff" for the full rationale.

package rust_task_grpc;

service RustTask {
  // Run exactly one trial. The stream returns behavioral events as they happen
  // and terminates with a `success` event.
  rpc run_trial(TrialConfig) returns (stream TrialEvent) {}

  // Operator live-mirror: downscaled JPEG frames of the subject display (~30 Hz).
  // Runs on a separate channel so it never touches the subject present path.
  rpc frames(FrameRequest) returns (stream MirrorFrame) {}
}

message TrialConfig {
  // json.dumps(task_config.unwrap()) — the SAME JSON the operator edits in the
  // existing joystick_intro config panel. Rust parses this into config.rs::TaskConfig.
  string config_json = 1;

  // Reward pulse durations (milliseconds) resolved by Python via context.get_reward(ch),
  // indexed by reward channel. Python owns the reward schedule (task_context.py:726-728);
  // Rust only shapes the inject_analog pulse. Length = number of channels the task may use.
  repeated double reward_ms = 2;

  // task_config["reward_scale"] (default 1.0). on_time_ms = round(reward_ms[ch] * reward_scale).
  double reward_scale = 3;

  // Clock-sync seed: Python's time.perf_counter() * 1e9 captured immediately before
  // the run_trial call. Rust maps its steady_clock into this domain so BehavState
  // Text.time values fall between Python's TRIAL START / TRIAL FINISHED. See clock.rs.
  uint64 python_perf_ns = 4;
}

message TrialEvent {
  oneof body {
    // A "BehavState=..." marker at the instant of a state transition. `time_ns` is
    // already mapped into the Python perf_counter domain. Rust ALSO logs this same
    // string to Thalamus.log directly; this copy is for the operator state display.
    BehavMarker marker = 1;

    // Final behav_result, key-order faithful (see events.rs). The delegate sets
    // context.behav_result so Python's existing trial_summ serialization emits it.
    string behav_result_json = 2;

    // Terminal event: trial outcome. Delegate maps this to TaskResult(success).
    bool success = 3;
  }
}

message BehavMarker {
  string text = 1;     // e.g. "BehavState=start_on"
  uint64 time_ns = 2;  // Python perf_counter domain, nanoseconds
}

message FrameRequest {
  uint32 max_hz = 1;     // operator-requested cap, e.g. 30
  uint32 max_width = 2;  // downscale target; 0 = executor default
}

message MirrorFrame {
  bytes jpeg = 1;
  uint32 width = 2;
  uint32 height = 3;
  uint64 time_ns = 4;
}
