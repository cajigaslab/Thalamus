<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thalamus — real-time, closed-loop multimodal data acquisition">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1A2B"/>
      <stop offset="0.55" stop-color="#0B1422"/>
      <stop offset="1" stop-color="#081019"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="300" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D9488" stop-opacity="0"/>
      <stop offset="0.1" stop-color="#0D9488"/>
      <stop offset="0.5" stop-color="#2DD4BF"/>
      <stop offset="0.9" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#FCD34D"/><stop offset="1" stop-color="#F59E0B"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#2DD4BF" stop-opacity="0.16"/><stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>
  <ellipse cx="640" cy="120" rx="560" ry="220" fill="url(#halo)"/>

  <!-- oscilloscope grid -->
  <g stroke="#2DD4BF" stroke-opacity="0.06" stroke-width="1">
    <path d="M80 60H1200M80 120H1200M80 180H1200M80 240H1200M80 300H1200"/>
    <path d="M200 40V320M320 40V320M440 40V320M560 40V320M680 40V320M800 40V320M920 40V320M1040 40V320"/>
  </g>

  <!-- eyebrow -->
  <text x="640" y="86" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="16" letter-spacing="7" fill="#5EEAD4" fill-opacity="0.92">REAL&#8209;TIME · CLOSED&#8209;LOOP · MULTIMODAL</text>

  <!-- wordmark -->
  <text x="640" y="178" text-anchor="middle"
        font-family="Georgia, 'Iowan Old Style', 'Times New Roman', serif"
        font-size="92" font-weight="700" letter-spacing="2" fill="#F7FAF9">Thalamus</text>

  <!-- divider -->
  <rect x="580" y="202" width="120" height="3" rx="1.5" fill="#F59E0B"/>

  <!-- tagline -->
  <text x="640" y="244" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="19" letter-spacing="1.5" fill="#9FB3C8">Synchronized data acquisition &amp; closed-loop control · for the OR and the lab</text>

  <!-- signal trace band -->
  <path d="M80 300 L300 300 L322 300 L340 276 L358 300 L560 300 L582 300 L600 282 L620 300 L860 300 L882 300 L900 268 L922 300 L1200 300"
        fill="none" stroke="url(#trace)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="900" cy="268" r="6.5" fill="url(#node)" filter="url(#glow)"/>
</svg>
