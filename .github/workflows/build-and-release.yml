name: Build and Release

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * 1"
    
permissions:
  contents: write
  
jobs:
  build-linux:
    runs-on: ubuntu-24.04
    environment: ${{ github.ref_name }}
    outputs:
      version: ${{ steps.version_bump.outputs.version }}
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}
      if: ${{ github.ref_name == 'main' }}
    - uses: actions/checkout@v4
      if: ${{ github.ref_name != 'main' }}
    - run: |
        echo ${{ secrets.CICD_PFX }} | base64 -d > cicd.pfx
        openssl pkcs12 -info -in cicd.pfx -passin pass: -nokeys
    - name: Set Git name 
      run: git config --global user.name "Github Actions"
    - name: Set Git email 
      run: git config --global user.email "no@email.com"
    - name: Update APT
      run: sudo apt update
    - run: python3 -m venv pyenv
    - name: Prepare
      run: source pyenv/bin/activate && python3 prepare.py
    - name: Version Bump
      run: |
        source $HOME/.thalamusrc && source pyenv/bin/activate && python3 bump.py patch
        echo version=`git describe --exact-match --tags` >> "$GITHUB_OUTPUT"
    - name: Build
      run: source $HOME/.thalamusrc && source pyenv/bin/activate && python3 -m build -n -w -Crelease -Cstrip

    - name: Archive and strip debug symbols
      run: |
        VERSION=`git describe --exact-match --tags`
        HASH=`git log -1 --format=%h`
        UNSTRIPPED=native-linux-$VERSION-$HASH
        echo $UNSTRIPPED

        echo ${{ secrets.CICD_PFX }} | base64 -d > cicd.pfx
        curl --cert-type P12 --cert cicd.pfx --data-binary @build/clang-release/native -H "Content-Type: application/octet-stream" https://sleeve.ophanim.org/proc/experiments/cicd/days/000000/files/$UNSTRIPPED
        checksum=`python3 checksum.py -a adler -i build/clang-release/native`
        echo checksum $checksum
        curl --cert-type P12 --cert cicd.pfx --data-binary $checksum -H "Content-Type: application/octet-stream" https://sleeve.ophanim.org/proc/experiments/cicd/days/000000/file_hashes/$UNSTRIPPED

    - name: Archive Distribution
      uses: actions/upload-artifact@v4
      with:
        name: linux-dist
        path: dist
    - run: |
        git push
        git push --tags
  build-windows:
    runs-on: windows-latest
    environment: ${{ github.ref_name }}
    steps:
    - uses: actions/checkout@v4
    - name: Set Git name 
      run: git config --global user.name "Github Actions"
    - name: Set Git email 
      run: git config --global user.email "no@email.com"
    - name: Prepare
      run: python prepare.py
    - name: Check gclient
      run: where gclient && gclient
    - name: Check clang
      run: where clang && clang --version
    - name: Version Bump
      run: python bump.py patch
    - name: Build
      shell: cmd
      run: |
        call "C:\\Program Files\\Microsoft Visual Studio\\2022\\Enterprise\\VC\\Auxiliary\\Build\\vcvars64.bat"
        set PATH=C:\Program Files\LLVM\bin;%PATH%
        python -m build -n -w -Crelease

    - name: Archive .pdb
      shell: bash
      run: |
        VERSION=`git describe --exact-match --tags`
        HASH=`git log -1 --format=%h`
        UNSTRIPPED=native-win-$VERSION-$HASH.pdb
        echo $UNSTRIPPED

        echo ${{ secrets.CICD_PFX }} | base64 -d > cicd.pfx
        curl --cert-type P12 --cert cicd.pfx --data-binary @build/clang-release/native.pdb -H "Content-Type: application/octet-stream" https://sleeve.ophanim.org/proc/experiments/cicd/days/000000/files/$UNSTRIPPED
        checksum=`python3 checksum.py -a adler -i build/clang-release/native.pdb`
        echo checksum $checksum
        curl --cert-type P12 --cert cicd.pfx --data-binary $checksum -H "Content-Type: application/octet-stream" https://sleeve.ophanim.org/proc/experiments/cicd/days/000000/file_hashes/$UNSTRIPPED

    - name: Archive Distribution
      uses: actions/upload-artifact@v4
      with:
        name: windows-dist
        path: dist
  build-mac:
    runs-on: macos-latest
    environment: ${{ github.ref_name }}
    steps:
    - uses: actions/checkout@v4
    - name: Set Git name 
      run: git config --global user.name "Github Actions"
    - name: Set Git email 
      run: git config --global user.email "no@email.com"
    - run: python3 -m venv pyenv
    - name: Prepare
      run: source pyenv/bin/activate && python3 prepare.py
    - name: nasm
      run: source $HOME/.thalamusrc && echo $PATH && echo $HOME && ls $HOME/nasm-2.15.05  && which nasm
    - name: Version Bump
      run: source $HOME/.thalamusrc && source pyenv/bin/activate && python3 bump.py patch
    - name: Build
      run: source $HOME/.thalamusrc && source pyenv/bin/activate && python3 -m build -n -w -Crelease -Cstrip

    - name: Archive and strip debug symbols
      run: |
        VERSION=`git describe --exact-match --tags`
        HASH=`git log -1 --format=%h`
        UNSTRIPPED=native-mac-$VERSION-$HASH
        echo $UNSTRIPPED

        echo ${{ secrets.CICD_PFX }} | base64 -d > cicd.pfx
        curl --cert-type P12 --cert cicd.pfx --data-binary @build/clang-release/native -H "Content-Type: application/octet-stream" https://sleeve.ophanim.org/proc/experiments/cicd/days/000000/files/$UNSTRIPPED
        checksum=`python3 checksum.py -a adler -i build/clang-release/native`
        echo checksum $checksum
        curl --cert-type P12 --cert cicd.pfx --data-binary $checksum -H "Content-Type: application/octet-stream" https://sleeve.ophanim.org/proc/experiments/cicd/days/000000/file_hashes/$UNSTRIPPED

    - name: Archive Distribution
      uses: actions/upload-artifact@v4
      with:
        name: mac-dist
        path: dist
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    needs: [build-linux, build-windows, build-mac]
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: linux-dist
    - uses: actions/download-artifact@v4
      with:
        name: windows-dist
    - uses: actions/download-artifact@v4
      with:
        name: mac-dist
    - name: Get Paths
      id: paths
      run: |
        echo linux=`ls *linux*.whl` >> "$GITHUB_OUTPUT"
        echo windows=`ls *win*.whl` >> "$GITHUB_OUTPUT"
        echo mac=`ls *mac*.whl` >> "$GITHUB_OUTPUT"
    - name: Create Release
      id: create-release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{needs.build-linux.outputs.version}}
        release_name: Release ${{needs.build-linux.outputs.version}}
        draft: false
        prerelease: false
    - name: Upload Linux Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create-release.outputs.upload_url }}
        asset_path: ${{ steps.paths.outputs.linux }}
        asset_name: ${{ steps.paths.outputs.linux }}
        asset_content_type: application/x-wheel+zip
    - name: Upload Windows Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create-release.outputs.upload_url }}
        asset_path: ${{ steps.paths.outputs.windows }}
        asset_name: ${{ steps.paths.outputs.windows }}
        asset_content_type: application/x-wheel+zip
    - name: Upload Mac Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create-release.outputs.upload_url }}
        asset_path: ${{ steps.paths.outputs.mac }}
        asset_name: ${{ steps.paths.outputs.mac }}
        asset_content_type: application/x-wheel+zip
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        ls *.whl
        sudo apt update
        sudo apt install -y python3 python3-pip python3-venv
        python3 -m venv venv
        source venv/bin/activate
        pip install twine
        twine upload *.whl
